AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Backend for Pasta Application
Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    Architectures:
    - x86_64
    Environment:
      Variables:
        TABLE_NAME:
          Ref: TransactionsTable
    Tags:
      project: pasta
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"
Resources:
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AWS::StackName}-Transactions
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: transactionId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      - AttributeName: transactionId
        KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      Tags:
      - Key: project
        Value: pasta
  UserSettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AWS::StackName}-UserSettings
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
      - Key: project
        Value: pasta
  PastaAppUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: ${AWS::StackName}-UserPool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Schema:
      - Name: email
        AttributeDataType: String
        Mutable: true
        Required: true
      UserPoolTags:
        project: pasta
  PastaAppUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName:
        Fn::Sub: ${AWS::StackName}-AppClient
      UserPoolId:
        Ref: PastaAppUserPool
      ExplicitAuthFlows:
      - ALLOW_USER_SRP_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      - ALLOW_USER_PASSWORD_AUTH
      GenerateSecret: false
  PastaApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Tags:
        project: pasta
      Auth:
        DefaultAuthorizer: CognitoAuth
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuth:
            UserPoolArn:
              Fn::GetAtt:
              - PastaAppUserPool
              - Arn
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
  GetTransactionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://budget-app-backend-eace1a68-47c0-48cc-95ca-e254d2fd86fa/daa091759c93db7694321b1331d31916
      Handler: transactions.getTransactions
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: TransactionsTable
      Events:
        GetApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: PastaApi
            Path: /transactions
            Method: GET
  CreateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://budget-app-backend-eace1a68-47c0-48cc-95ca-e254d2fd86fa/daa091759c93db7694321b1331d31916
      Handler: transactions.createTransaction
      Policies:
      - DynamoDBWritePolicy:
          TableName:
            Ref: TransactionsTable
      Events:
        PostApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: PastaApi
            Path: /transactions
            Method: POST
  UpdateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://budget-app-backend-eace1a68-47c0-48cc-95ca-e254d2fd86fa/daa091759c93db7694321b1331d31916
      Handler: transactions.updateTransaction
      Policies:
      - DynamoDBWritePolicy:
          TableName:
            Ref: TransactionsTable
      Events:
        PutApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: PastaApi
            Path: /transactions/{id}
            Method: PUT
  DeleteTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://budget-app-backend-eace1a68-47c0-48cc-95ca-e254d2fd86fa/daa091759c93db7694321b1331d31916
      Handler: transactions.deleteTransaction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TransactionsTable
      Events:
        DeleteApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: PastaApi
            Path: /transactions/{id}
            Method: DELETE
  GetSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://budget-app-backend-eace1a68-47c0-48cc-95ca-e254d2fd86fa/daa091759c93db7694321b1331d31916
      Handler: settings.getSettings
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: UserSettingsTable
      Environment:
        Variables:
          SETTINGS_TABLE_NAME:
            Ref: UserSettingsTable
      Events:
        GetApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: PastaApi
            Path: /settings
            Method: GET
  UpdateSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://budget-app-backend-eace1a68-47c0-48cc-95ca-e254d2fd86fa/daa091759c93db7694321b1331d31916
      Handler: settings.updateSettings
      Policies:
      - DynamoDBWritePolicy:
          TableName:
            Ref: UserSettingsTable
      Environment:
        Variables:
          SETTINGS_TABLE_NAME:
            Ref: UserSettingsTable
      Events:
        PutApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: PastaApi
            Path: /settings
            Method: PUT
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${PastaApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  UserPoolId:
    Description: Cognito User Pool ID
    Value:
      Ref: PastaAppUserPool
  UserPoolClientId:
    Description: Cognito App Client ID
    Value:
      Ref: PastaAppUserPoolClient
