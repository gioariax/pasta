AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Backend for Budget Application
Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    Architectures:
    - x86_64
    Environment:
      Variables:
        TABLE_NAME:
          Ref: TransactionsTable
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"
Resources:
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AWS::StackName}-Transactions
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: transactionId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      - AttributeName: transactionId
        KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  BudgetAppUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: ${AWS::StackName}-UserPool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Schema:
      - Name: email
        AttributeDataType: String
        Mutable: true
        Required: true
  BudgetAppUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName:
        Fn::Sub: ${AWS::StackName}-AppClient
      UserPoolId:
        Ref: BudgetAppUserPool
      ExplicitAuthFlows:
      - ALLOW_USER_SRP_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      - ALLOW_USER_PASSWORD_AUTH
      GenerateSecret: false
  BudgetApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: CognitoAuth
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuth:
            UserPoolArn:
              Fn::GetAtt:
              - BudgetAppUserPool
              - Arn
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
  GetTransactionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://budget-app-backend-eace1a68-47c0-48cc-95ca-e254d2fd86fa/cfd16174e0c7117402b12b364c48abcb
      Handler: transactions.getTransactions
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: TransactionsTable
      Events:
        GetApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: BudgetApi
            Path: /transactions
            Method: GET
  CreateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://budget-app-backend-eace1a68-47c0-48cc-95ca-e254d2fd86fa/cfd16174e0c7117402b12b364c48abcb
      Handler: transactions.createTransaction
      Policies:
      - DynamoDBWritePolicy:
          TableName:
            Ref: TransactionsTable
      Events:
        PostApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: BudgetApi
            Path: /transactions
            Method: POST
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${BudgetApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  UserPoolId:
    Description: Cognito User Pool ID
    Value:
      Ref: BudgetAppUserPool
  UserPoolClientId:
    Description: Cognito App Client ID
    Value:
      Ref: BudgetAppUserPoolClient
