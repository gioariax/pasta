AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Backend for Pasta Application

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        TABLE_NAME: !Ref TransactionsTable
    Tags:
      project: pasta
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Resources:
  # -----------------------------------------------------------------
  # DynamoDB Table
  # -----------------------------------------------------------------
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Transactions
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: transactionId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: transactionId
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: project
          Value: pasta

  UserSettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-UserSettings
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: project
          Value: pasta

  # -----------------------------------------------------------------
  # Cognito User Pool & Client
  # -----------------------------------------------------------------
  PastaAppUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-UserPool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      UserPoolTags:
        project: pasta

  PastaAppUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${AWS::StackName}-AppClient
      UserPoolId: !Ref PastaAppUserPool
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      GenerateSecret: false

  # -----------------------------------------------------------------
  # API Gateway parameters for Cognito Authorizer
  # -----------------------------------------------------------------
  PastaApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Tags:
        project: pasta
      Auth:
        DefaultAuthorizer: CognitoAuth
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuth:
            UserPoolArn: !GetAtt PastaAppUserPool.Arn
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  # -----------------------------------------------------------------
  # Lambda Functions
  # -----------------------------------------------------------------
  GetTransactionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/
      Handler: transactions.getTransactions
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TransactionsTable
      Events:
        GetApi:
          Type: Api
          Properties:
            RestApiId: !Ref PastaApi
            Path: /transactions
            Method: GET

  CreateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/
      Handler: transactions.createTransaction
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref TransactionsTable
      Events:
        PostApi:
          Type: Api
          Properties:
            RestApiId: !Ref PastaApi
            Path: /transactions
            Method: POST

  UpdateTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/
      Handler: transactions.updateTransaction
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref TransactionsTable
      Events:
        PutApi:
          Type: Api
          Properties:
            RestApiId: !Ref PastaApi
            Path: /transactions/{id}
            Method: PUT

  DeleteTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/
      Handler: transactions.deleteTransaction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TransactionsTable
      Events:
        DeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref PastaApi
            Path: /transactions/{id}
            Method: DELETE

  GetSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/
      Handler: settings.getSettings
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UserSettingsTable
      Environment:
        Variables:
          SETTINGS_TABLE_NAME: !Ref UserSettingsTable
      Events:
        GetApi:
          Type: Api
          Properties:
            RestApiId: !Ref PastaApi
            Path: /settings
            Method: GET

  UpdateSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/
      Handler: settings.updateSettings
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref UserSettingsTable
      Environment:
        Variables:
          SETTINGS_TABLE_NAME: !Ref UserSettingsTable
      Events:
        PutApi:
          Type: Api
          Properties:
            RestApiId: !Ref PastaApi
            Path: /settings
            Method: PUT

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${PastaApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref PastaAppUserPool
  UserPoolClientId:
    Description: "Cognito App Client ID"
    Value: !Ref PastaAppUserPoolClient
